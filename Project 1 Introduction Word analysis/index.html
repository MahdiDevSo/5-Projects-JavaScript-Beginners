<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Analytics</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Word Analytics</h1>
      <textarea id="text-input" placeholder="start typing...."></textarea>
      <div class="stats">
        <div class="stat-box">
          <p id="word-count">0</p>
          <p>Words</p>
        </div>

        <div class="stat-box">
          <p id="char-count">0</p>
          <p>characters</p>
        </div>

        <div class="stat-box">
          <p id="twitter-limit">0</p>
          <p>Twitter</p>
        </div>

        <div class="stat-box">
          <p id="facebook-limit">0</p>
          <p>Facebook</p>
        </div>
      </div>

      <footer>word Analytics &copy; 2026</footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
